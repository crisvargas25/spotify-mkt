<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spotify × ¿Cómo te sientes hoy?</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #1DB954;
    --green-neon: #3DFF7A;
    --pink: #FF4D8F;
    --yellow: #FFE600;
    --purple: #7B2FFF;
    --blue: #00D4FF;
    --orange: #FF6B35;
    --dark: #0A0A0A;
    --card-bg: #111111;
    --text: #FFFFFF;
    --text-muted: rgba(255,255,255,0.55);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    cursor: none;
  }

  /* NOISE */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 9997; opacity: 0.4;
  }

  /* CURSOR */
  .cursor {
    width: 12px; height: 12px;
    background: var(--green-neon);
    border-radius: 50%;
    position: fixed; pointer-events: none;
    z-index: 9999;
    transition: transform 0.15s ease, background 0.3s ease;
    mix-blend-mode: difference;
  }
  .cursor-trail {
    width: 36px; height: 36px;
    border: 1.5px solid var(--green-neon);
    border-radius: 50%;
    position: fixed; pointer-events: none;
    z-index: 9998;
    transition: all 0.18s ease;
    mix-blend-mode: difference;
  }

  /* BG ORBS */
  .bg-orb {
    position: fixed; border-radius: 50%;
    pointer-events: none; z-index: 0;
    filter: blur(80px); opacity: 0.15;
    transition: all 1.5s ease;
  }
  .orb-1 { width: 500px; height: 500px; background: var(--green); top: -150px; right: -100px; }
  .orb-2 { width: 400px; height: 400px; background: var(--purple); bottom: -100px; left: -100px; }
  .orb-3 { width: 300px; height: 300px; background: var(--pink); top: 40%; left: 40%; opacity: 0.08; }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0;
    padding: 20px 48px;
    display: flex; align-items: center; justify-content: space-between;
    z-index: 100;
    backdrop-filter: blur(20px);
    background: rgba(10,10,10,0.7);
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .nav-logo {
    display: flex; align-items: center; gap: 10px;
    font-family: 'Syne', sans-serif;
    font-weight: 800; font-size: 1rem;
    letter-spacing: -0.02em;
    text-decoration: none; color: #fff;
  }
  .nav-logo svg { width: 28px; height: 28px; }
  .nav-back {
    display: flex; align-items: center; gap: 8px;
    font-size: 0.8rem; font-weight: 600;
    color: var(--text-muted);
    text-decoration: none;
    letter-spacing: 0.06em; text-transform: uppercase;
    transition: color 0.2s;
    border: 1px solid rgba(255,255,255,0.1);
    padding: 8px 18px; border-radius: 100px;
  }
  .nav-back:hover { color: var(--green-neon); border-color: var(--green-neon); }

  /* MAIN LAYOUT */
  main {
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 120px 24px 80px;
    position: relative; z-index: 1;
  }

  /* SCREEN STATES */
  .screen { display: none; width: 100%; max-width: 1100px; }
  .screen.active { display: flex; flex-direction: column; align-items: center; }

  /* ===== SCREEN 1: QUESTION ===== */
  #screen-question {
    text-align: center;
  }

  .q-tag {
    font-size: 0.72rem; font-weight: 700;
    letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--green-neon);
    background: rgba(61,255,122,0.1);
    border: 1px solid rgba(61,255,122,0.3);
    padding: 6px 16px; border-radius: 100px;
    margin-bottom: 32px; display: inline-flex;
    animation: fadeUp 0.6s ease both;
  }

  .q-headline {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2.8rem, 7vw, 5.5rem);
    font-weight: 900; line-height: 0.95;
    letter-spacing: -0.04em;
    margin-bottom: 16px;
    animation: fadeUp 0.6s 0.1s ease both;
  }
  .q-headline span { color: var(--green-neon); }

  .q-sub {
    font-size: 1rem; color: var(--text-muted);
    font-weight: 300; margin-bottom: 64px;
    animation: fadeUp 0.6s 0.2s ease both;
  }

  /* EMOTION GRID */
  .emotions-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px; width: 100%;
    animation: fadeUp 0.6s 0.3s ease both;
  }

  .emotion-btn {
    position: relative;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px;
    padding: 32px 20px;
    border-radius: 24px;
    border: 2px solid transparent;
    background: var(--card-bg);
    cursor: none;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    overflow: hidden;
  }
  .emotion-btn::before {
    content: '';
    position: absolute; inset: 0;
    opacity: 0; transition: opacity 0.3s;
    border-radius: 22px;
  }
  .emotion-btn:hover {
    transform: translateY(-8px) scale(1.03);
  }
  .emotion-btn:active { transform: scale(0.97); }

  /* POSITIVE */
  .emotion-btn.positive { border-color: rgba(61,255,122,0.2); }
  .emotion-btn.positive::before { background: radial-gradient(circle at center, rgba(61,255,122,0.12) 0%, transparent 70%); }
  .emotion-btn.positive:hover { border-color: var(--green-neon); box-shadow: 0 0 40px rgba(61,255,122,0.2); }
  .emotion-btn.positive:hover::before { opacity: 1; }

  /* NEGATIVE */
  .emotion-btn.negative { border-color: rgba(255,77,143,0.2); }
  .emotion-btn.negative::before { background: radial-gradient(circle at center, rgba(255,77,143,0.12) 0%, transparent 70%); }
  .emotion-btn.negative:hover { border-color: var(--pink); box-shadow: 0 0 40px rgba(255,77,143,0.2); }
  .emotion-btn.negative:hover::before { opacity: 1; }

  .emotion-emoji {
    font-size: 3rem; line-height: 1;
    transition: transform 0.3s;
  }
  .emotion-btn:hover .emotion-emoji { transform: scale(1.2) rotate(-5deg); }

  .emotion-name {
    font-family: 'Syne', sans-serif;
    font-size: 1.1rem; font-weight: 800;
    letter-spacing: -0.02em;
  }
  .emotion-btn.positive .emotion-name { color: var(--green-neon); }
  .emotion-btn.negative .emotion-name { color: var(--pink); }

  .emotion-desc {
    font-size: 0.75rem; color: var(--text-muted);
    line-height: 1.4; text-align: center;
  }

  .emotion-type-badge {
    position: absolute; top: 12px; right: 12px;
    font-size: 0.58rem; font-weight: 800;
    letter-spacing: 0.1em; text-transform: uppercase;
    padding: 3px 8px; border-radius: 100px;
  }
  .positive .emotion-type-badge {
    background: rgba(61,255,122,0.15); color: var(--green-neon);
    border: 1px solid rgba(61,255,122,0.3);
  }
  .negative .emotion-type-badge {
    background: rgba(255,77,143,0.15); color: var(--pink);
    border: 1px solid rgba(255,77,143,0.3);
  }

  /* SECTION DIVIDER */
  .emotions-divider {
    display: flex; align-items: center; gap: 16px;
    width: 100%; margin: 8px 0;
    grid-column: 1 / -1;
  }
  .divider-line { flex: 1; height: 1px; background: rgba(255,255,255,0.08); }
  .divider-label {
    font-size: 0.65rem; font-weight: 700;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: rgba(255,255,255,0.25);
  }

  /* ===== SCREEN 2: LOADING ===== */
  #screen-loading {
    align-items: center; justify-content: center;
    text-align: center; gap: 32px;
  }
  .loading-emoji {
    font-size: 5rem;
    animation: bounce 0.6s ease infinite alternate;
  }
  @keyframes bounce {
    from { transform: translateY(0) scale(1); }
    to { transform: translateY(-16px) scale(1.05); }
  }
  .loading-bars {
    display: flex; gap: 6px; align-items: flex-end;
    height: 40px; justify-content: center;
  }
  .loading-bar {
    width: 6px; border-radius: 100px;
    background: var(--green-neon);
    animation: barAnim 0.8s ease infinite alternate;
  }
  .loading-bar:nth-child(1) { animation-delay: 0s; }
  .loading-bar:nth-child(2) { animation-delay: 0.1s; }
  .loading-bar:nth-child(3) { animation-delay: 0.2s; }
  .loading-bar:nth-child(4) { animation-delay: 0.3s; }
  .loading-bar:nth-child(5) { animation-delay: 0.4s; }
  @keyframes barAnim {
    from { height: 8px; opacity: 0.4; }
    to { height: 40px; opacity: 1; }
  }
  .loading-text {
    font-family: 'Syne', sans-serif;
    font-size: 1.4rem; font-weight: 800;
    animation: pulse 1.2s ease infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; } 50% { opacity: 0.4; }
  }

  /* ===== SCREEN 3: RESULT ===== */
  #screen-result { gap: 0; }

  .result-card {
    width: 100%; border-radius: 32px;
    padding: 52px 48px;
    position: relative; overflow: hidden;
    animation: scaleIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.85) translateY(20px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .result-card.positive-result {
    background: linear-gradient(135deg, #0d1a0d 0%, #0a120a 100%);
    border: 2px solid rgba(61,255,122,0.35);
  }
  .result-card.positive-result::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(circle at 80% 20%, rgba(61,255,122,0.12) 0%, transparent 60%);
  }
  .result-card.negative-result {
    background: linear-gradient(135deg, #1a0a12 0%, #120a0a 100%);
    border: 2px solid rgba(255,77,143,0.35);
  }
  .result-card.negative-result::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(circle at 20% 80%, rgba(255,77,143,0.12) 0%, transparent 60%);
  }

  .result-top {
    display: flex; align-items: flex-start;
    justify-content: space-between; margin-bottom: 40px;
    position: relative;
  }

  .result-emotion-display {
    display: flex; align-items: center; gap: 16px;
  }
  .result-emoji-big { font-size: 3.5rem; }
  .result-emotion-label {
    font-size: 0.68rem; font-weight: 700;
    letter-spacing: 0.14em; text-transform: uppercase;
    margin-bottom: 4px;
  }
  .result-emotion-name {
    font-family: 'Syne', sans-serif;
    font-size: 1.6rem; font-weight: 900;
    line-height: 1;
  }

  .result-spotify-badge {
    display: flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 100px; padding: 8px 16px;
  }
  .result-spotify-badge svg { width: 18px; height: 18px; }
  .result-spotify-badge span {
    font-size: 0.75rem; font-weight: 700;
    color: var(--green);
  }

  .result-divider {
    height: 1px; background: rgba(255,255,255,0.08);
    margin-bottom: 36px; position: relative;
  }

  .result-song-label {
    font-size: 0.68rem; font-weight: 700;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--text-muted); margin-bottom: 12px;
    position: relative;
  }

  .result-song-name {
    font-family: 'Syne', sans-serif;
    font-size: clamp(1.8rem, 4vw, 3rem);
    font-weight: 900; line-height: 1.05;
    letter-spacing: -0.03em;
    margin-bottom: 8px; position: relative;
  }
  .positive-result .result-song-name { color: var(--green-neon); }
  .negative-result .result-song-name { color: var(--pink); }

  .result-artist {
    font-size: 1rem; color: var(--text-muted);
    font-weight: 400; margin-bottom: 36px;
    position: relative;
  }

  .result-message-box {
    border-radius: 16px; padding: 24px 28px;
    position: relative;
  }
  .positive-result .result-message-box {
    background: rgba(61,255,122,0.08);
    border: 1px solid rgba(61,255,122,0.2);
  }
  .negative-result .result-message-box {
    background: rgba(255,77,143,0.08);
    border: 1px solid rgba(255,77,143,0.2);
  }

  .result-message-icon { font-size: 1.4rem; margin-bottom: 10px; display: block; }
  .result-message {
    font-size: 1rem; line-height: 1.7;
    font-weight: 400;
  }
  .positive-result .result-message { color: rgba(255,255,255,0.85); }
  .negative-result .result-message { color: rgba(255,255,255,0.85); }
  .result-message strong { color: #fff; font-weight: 700; }

  /* ALBUM ART VISUAL */
  .album-visual {
    position: absolute; right: 48px; bottom: 52px;
    width: 120px; height: 120px; border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 4rem;
    animation: floatAlbum 3s ease-in-out infinite;
    opacity: 0.6;
  }
  @keyframes floatAlbum {
    0%,100% { transform: translateY(0) rotate(-3deg); }
    50% { transform: translateY(-10px) rotate(3deg); }
  }

  /* ACTIONS */
  .result-actions {
    display: flex; gap: 12px;
    margin-top: 28px; width: 100%;
    position: relative;
  }
  .btn-retry {
    flex: 1; padding: 16px 24px;
    border-radius: 100px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    color: #fff; font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem; font-weight: 600;
    cursor: none; transition: all 0.25s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-retry:hover {
    background: rgba(255,255,255,0.12);
    border-color: rgba(255,255,255,0.3);
    transform: translateY(-2px);
  }
  .btn-spotify {
    flex: 1.5; padding: 16px 24px;
    border-radius: 100px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem; font-weight: 700;
    cursor: none; transition: all 0.25s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    text-decoration: none;
  }
  .positive-result ~ .result-actions .btn-spotify,
  .btn-spotify.pos {
    background: var(--green-neon); color: #000;
  }
  .btn-spotify.pos:hover { box-shadow: 0 0 30px rgba(61,255,122,0.4); transform: translateY(-2px) scale(1.02); }
  .btn-spotify.neg {
    background: var(--pink); color: #fff;
  }
  .btn-spotify.neg:hover { box-shadow: 0 0 30px rgba(255,77,143,0.4); transform: translateY(-2px) scale(1.02); }

  /* ANIMATIONS */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* CONFETTI */
  .confetti-piece {
    position: fixed; width: 10px; height: 10px;
    border-radius: 2px;
    pointer-events: none; z-index: 9996;
    animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* WAVE */
  .wave-piece {
    position: fixed; width: 8px; height: 8px;
    border-radius: 50%;
    pointer-events: none; z-index: 9996;
    animation: waveFall linear forwards;
  }
  @keyframes waveFall {
    0% { transform: translateY(-20px) scale(1); opacity: 0.8; }
    100% { transform: translateY(110vh) scale(0.3); opacity: 0; }
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #0a0a0a; }
  ::-webkit-scrollbar-thumb { background: var(--green); border-radius: 100px; }

  @media (max-width: 640px) {
    nav { padding: 16px 20px; }
    .emotions-grid { grid-template-columns: repeat(2, 1fr); }
    .result-card { padding: 32px 24px; }
    .album-visual { display: none; }
    .q-headline { font-size: 2.4rem; }
  }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-trail" id="cursorTrail"></div>

<div class="bg-orb orb-1" id="orb1"></div>
<div class="bg-orb orb-2" id="orb2"></div>
<div class="bg-orb orb-3" id="orb3"></div>

<!-- NAV -->
<nav>
  <a class="nav-logo" href="spotify-bienestar.html">
    <svg viewBox="0 0 24 24" fill="#1DB954"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
    Spotify × Bienestar
  </a>
  <a class="nav-back" href="index.html">← Volver al proyecto</a>
</nav>

<main>

  <!-- SCREEN 1: QUESTION -->
  <div class="screen active" id="screen-question">
    <div class="q-tag">✦ Tu momento · Tu música</div>
    <h1 class="q-headline">¿Cómo te<br><span>sientes</span><br>hoy?</h1>
    <p class="q-sub">Elige cómo estás y encontramos la canción perfecta para ti.</p>

    <div class="emotions-grid">

      <!-- POSITIVAS -->
      <div class="emotions-divider" style="grid-column:1/-1;display:flex;align-items:center;gap:16px;margin-bottom:4px">
        <div class="divider-line"></div>
        <div class="divider-label">✨ Me siento bien</div>
        <div class="divider-line"></div>
      </div>

      <button class="emotion-btn positive" onclick="selectEmotion('feliz')">
        <div class="emotion-type-badge">Positivo</div>
        <div class="emotion-emoji">😄</div>
        <div class="emotion-name">Feliz</div>
        <div class="emotion-desc">Con energía y con ganas de comerte el mundo</div>
      </button>

      <button class="emotion-btn positive" onclick="selectEmotion('enamorado')">
        <div class="emotion-type-badge">Positivo</div>
        <div class="emotion-emoji">🥰</div>
        <div class="emotion-name">Enamorado</div>
        <div class="emotion-desc">Con el corazón lleno y mariposas en el estómago</div>
      </button>

      <button class="emotion-btn positive" onclick="selectEmotion('motivado')">
        <div class="emotion-type-badge">Positivo</div>
        <div class="emotion-emoji">🔥</div>
        <div class="emotion-name">Motivado</div>
        <div class="emotion-desc">Listo para conquistar todo lo que te propongas</div>
      </button>

      <button class="emotion-btn positive" onclick="selectEmotion('tranquilo')">
        <div class="emotion-type-badge">Positivo</div>
        <div class="emotion-emoji">😌</div>
        <div class="emotion-name">Tranquilo</div>
        <div class="emotion-desc">En paz, sin prisa, disfrutando el momento</div>
      </button>

      <!-- NEGATIVAS -->
      <div class="emotions-divider" style="grid-column:1/-1;display:flex;align-items:center;gap:16px;margin-top:8px;margin-bottom:4px">
        <div class="divider-line"></div>
        <div class="divider-label">💙 No estoy tan bien</div>
        <div class="divider-line"></div>
      </div>

      <button class="emotion-btn negative" onclick="selectEmotion('triste')">
        <div class="emotion-type-badge">Difícil</div>
        <div class="emotion-emoji">😞</div>
        <div class="emotion-name">Triste</div>
        <div class="emotion-desc">Con el corazón pesado y necesitando un abrazo</div>
      </button>

      <button class="emotion-btn negative" onclick="selectEmotion('ansioso')">
        <div class="emotion-type-badge">Difícil</div>
        <div class="emotion-emoji">😰</div>
        <div class="emotion-name">Ansioso</div>
        <div class="emotion-desc">Con la mente acelerada y sin poder parar</div>
      </button>

      <button class="emotion-btn negative" onclick="selectEmotion('agotado')">
        <div class="emotion-type-badge">Difícil</div>
        <div class="emotion-emoji">😮‍💨</div>
        <div class="emotion-name">Agotado</div>
        <div class="emotion-desc">Sin energía, necesitando parar y respirar</div>
      </button>

      <button class="emotion-btn negative" onclick="selectEmotion('enojado')">
        <div class="emotion-type-badge">Difícil</div>
        <div class="emotion-emoji">😤</div>
        <div class="emotion-name">Enojado</div>
        <div class="emotion-desc">Frustrado, con todo chocándote y sin paciencia</div>
      </button>

    </div>
  </div>

  <!-- SCREEN 2: LOADING -->
  <div class="screen" id="screen-loading">
    <div class="loading-emoji" id="loadingEmoji">🎵</div>
    <div class="loading-bars">
      <div class="loading-bar"></div>
      <div class="loading-bar"></div>
      <div class="loading-bar"></div>
      <div class="loading-bar"></div>
      <div class="loading-bar"></div>
    </div>
    <div class="loading-text" id="loadingText">Buscando tu canción...</div>
  </div>

  <!-- SCREEN 3: RESULT -->
  <div class="screen" id="screen-result">
    <!-- Populated by JS -->
  </div>

</main>

<script>
// ===== CURSOR =====
const cursor = document.getElementById('cursor');
const trail = document.getElementById('cursorTrail');
let mx = 0, my = 0, tx = 0, ty = 0;

document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cursor.style.left = mx - 6 + 'px';
  cursor.style.top = my - 6 + 'px';
  // move orbs slightly
  document.getElementById('orb3').style.transform =
    `translate(${(mx - window.innerWidth/2) * 0.02}px, ${(my - window.innerHeight/2) * 0.02}px)`;
});

function animTrail() {
  tx += (mx - tx) * 0.12;
  ty += (my - ty) * 0.12;
  trail.style.left = tx - 18 + 'px';
  trail.style.top = ty - 18 + 'px';
  requestAnimationFrame(animTrail);
}
animTrail();

document.querySelectorAll('button, a, .emotion-btn').forEach(el => {
  el.addEventListener('mouseenter', () => cursor.style.transform = 'scale(2.5)');
  el.addEventListener('mouseleave', () => cursor.style.transform = 'scale(1)');
});

// ===== EMOTION DATA =====
const emotions = {
  feliz: {
    type: 'positive',
    emoji: '😄',
    name: 'Feliz',
    song: 'Happy',
    artist: 'Pharrell Williams',
    albumEmoji: '🌈',
    accentColor: 'var(--green-neon)',
    loadingMsg: 'Encontrando algo tan alegre como tú...',
    message: `¡Tu canción de hoy es <strong>"Happy"</strong> de Pharrell Williams — porque cuando estás feliz, el mundo entero lo siente. Espero que cuando la escuches sigas bailando con esa energía que tienes hoy. ¡Que nada apague tu brillo! 🌟`,
    searchQuery: 'Happy Pharrell Williams'
  },
  enamorado: {
    type: 'positive',
    emoji: '🥰',
    name: 'Enamorado',
    song: 'Perfect',
    artist: 'Ed Sheeran',
    albumEmoji: '💖',
    accentColor: '#FF85A1',
    loadingMsg: 'Buscando algo tan bonito como lo que sientes...',
    message: `Tu canción de hoy es <strong>"Perfect"</strong> de Ed Sheeran — porque cuando el corazón está lleno, mereces una canción que lo capture todo. Espero que cuando la escuches pienses en esa persona especial y sigas sintiendo esas mariposas tan lindas. ✨`,
    searchQuery: 'Perfect Ed Sheeran'
  },
  motivado: {
    type: 'positive',
    emoji: '🔥',
    name: 'Motivado',
    song: 'Eye of the Tiger',
    artist: 'Survivor',
    albumEmoji: '🏆',
    accentColor: 'var(--yellow)',
    loadingMsg: 'Cargando algo tan poderoso como tu energía...',
    message: `Tu canción de hoy es <strong>"Eye of the Tiger"</strong> de Survivor — porque cuando estás en modo conquista, necesitas el soundtrack perfecto. Espero que cuando la escuches sigas con esa fuerza imparable que hoy tienes. ¡Nada te detiene! 💪`,
    searchQuery: 'Eye of the Tiger Survivor'
  },
  triste: {
    type: 'negative',
    emoji: '😞',
    name: 'Triste',
    song: 'The Night We Met',
    artist: 'Lord Huron',
    albumEmoji: '🌧️',
    accentColor: 'var(--blue)',
    loadingMsg: 'Buscando algo que te acompañe en este momento...',
    message: `Esta es tu canción de hoy: <strong>"The Night We Met"</strong> de Lord Huron. A veces la tristeza necesita espacio para existir, y esta canción la entiende. Espero que después de escucharla puedas sentirte un poco más acompañado. No estás solo en esto. 💙`,
    searchQuery: 'The Night We Met Lord Huron'
  },
  ansioso: {
    type: 'negative',
    emoji: '😰',
    name: 'Ansioso',
    song: 'Weightless',
    artist: 'Marconi Union',
    albumEmoji: '🌊',
    accentColor: '#7B9CFF',
    loadingMsg: 'Encontrando algo que calme esa mente activa...',
    message: `Esta es tu canción de hoy: <strong>"Weightless"</strong> de Marconi Union — considerada científicamente la canción más relajante del mundo. Cierra los ojos, respira profundo y déjala llevarte. Espero que después de escucharla puedas sentirte más tranquilo y en paz. 🌊`,
    searchQuery: 'Weightless Marconi Union'
  },
  tranquilo: {
    type: 'positive',
    emoji: '😌',
    name: 'Tranquilo',
    song: 'Sunday Morning',
    artist: 'Maroon 5',
    albumEmoji: '☀️',
    accentColor: 'var(--blue)',
    loadingMsg: 'Encontrando algo tan sereno como te sientes...',
    message: `Tu canción de hoy es <strong>"Sunday Morning"</strong> de Maroon 5 — porque los momentos de paz merecen su propio soundtrack. Espero que cuando la escuches sigas disfrutando de esa calma tan bonita que tienes hoy. Quedarte en este momento es todo. 🌿`,
    searchQuery: 'Sunday Morning Maroon 5'
  },
  enojado: {
    type: 'negative',
    emoji: '😤',
    name: 'Enojado',
    song: 'Break Stuff',
    artist: 'Limp Bizkit',
    albumEmoji: '⚡',
    accentColor: 'var(--orange)',
    loadingMsg: 'Buscando algo que entienda cómo te sientes...',
    message: `Esta es tu canción de hoy: <strong>"Break Stuff"</strong> de Limp Bizkit — porque a veces necesitas música que entienda tu energía sin juzgarte. Espero que después de escucharla puedas soltar todo eso que te pesa y sentirte un poco más ligero. El enojo también pasa. ⚡`,
    searchQuery: 'Break Stuff Limp Bizkit'
  },
  agotado: {
    type: 'negative',
    emoji: '😮‍💨',
    name: 'Agotado',
    song: 'Breathe (2 AM)',
    artist: 'Anna Nalick',
    albumEmoji: '🕯️',
    accentColor: '#B97FFF',
    loadingMsg: 'Preparando algo suave para tu descanso...',
    message: `Esta es tu canción de hoy: <strong>"Breathe (2 AM)"</strong> de Anna Nalick. Cuando todo pesa demasiado, a veces solo necesitas respirar. Espero que después de escucharla puedas sentirte un poco más ligero y recordar que está bien parar. Date permiso de descansar. 🕯️`,
    searchQuery: 'Breathe 2 AM Anna Nalick'
  }
};

// ===== CONFETTI / PARTICLES =====
function launchConfetti() {
  const colors = ['#3DFF7A','#FFE600','#00D4FF','#fff','#1DB954'];
  for (let i = 0; i < 60; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.cssText = `
      left: ${Math.random() * 100}vw;
      top: -20px;
      background: ${colors[Math.floor(Math.random() * colors.length)]};
      width: ${6 + Math.random() * 10}px;
      height: ${6 + Math.random() * 10}px;
      border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
      animation-duration: ${2 + Math.random() * 2}s;
      animation-delay: ${Math.random() * 0.5}s;
    `;
    document.body.appendChild(piece);
    setTimeout(() => piece.remove(), 4000);
  }
}

function launchWaves() {
  const colors = ['rgba(255,77,143,0.8)','rgba(123,47,255,0.8)','rgba(0,212,255,0.6)'];
  for (let i = 0; i < 30; i++) {
    const piece = document.createElement('div');
    piece.className = 'wave-piece';
    piece.style.cssText = `
      left: ${Math.random() * 100}vw;
      top: -10px;
      background: ${colors[Math.floor(Math.random() * colors.length)]};
      animation-duration: ${3 + Math.random() * 2}s;
      animation-delay: ${Math.random() * 0.8}s;
    `;
    document.body.appendChild(piece);
    setTimeout(() => piece.remove(), 5000);
  }
}

// ===== CHANGE ORB COLORS =====
function setOrbsForEmotion(type) {
  const orb1 = document.getElementById('orb1');
  const orb2 = document.getElementById('orb2');
  if (type === 'positive') {
    orb1.style.background = 'var(--green)';
    orb2.style.background = 'var(--blue)';
  } else {
    orb1.style.background = 'var(--pink)';
    orb2.style.background = 'var(--purple)';
  }
}

// ===== SHOW / HIDE SCREENS =====
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ===== SELECT EMOTION =====
function selectEmotion(key) {
  const data = emotions[key];
  setOrbsForEmotion(data.type);

  // Show loading
  document.getElementById('loadingEmoji').textContent = data.emoji;
  document.getElementById('loadingText').textContent = data.loadingMsg;
  if (data.type === 'positive') {
    document.querySelectorAll('.loading-bar').forEach(b => b.style.background = 'var(--green-neon)');
  } else {
    document.querySelectorAll('.loading-bar').forEach(b => b.style.background = 'var(--pink)');
  }
  showScreen('screen-loading');

  // Simulate search delay
  setTimeout(() => {
    buildResult(data);
    showScreen('screen-result');
    if (data.type === 'positive') launchConfetti();
    else launchWaves();
  }, 2200);
}

// ===== BUILD RESULT =====
function buildResult(data) {
  const isPositive = data.type === 'positive';
  const cardClass = isPositive ? 'positive-result' : 'negative-result';
  const btnClass = isPositive ? 'pos' : 'neg';
  const spotifySearch = `https://open.spotify.com/search/${encodeURIComponent(data.searchQuery)}`;

  const resultEl = document.getElementById('screen-result');
  resultEl.innerHTML = `
    <div class="result-card ${cardClass}">
      <div class="result-top">
        <div class="result-emotion-display">
          <div class="result-emoji-big">${data.emoji}</div>
          <div>
            <div class="result-emotion-label" style="color:${isPositive ? 'var(--green-neon)' : 'var(--pink)'}">
              ${isPositive ? '✨ Emoción positiva' : '💙 Emoción difícil'}
            </div>
            <div class="result-emotion-name">${data.name}</div>
          </div>
        </div>
        <div class="result-spotify-badge">
          <svg viewBox="0 0 24 24" fill="#1DB954"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
          <span>Canción para ti</span>
        </div>
      </div>

      <div class="result-divider"></div>

      <div class="result-song-label">🎵 Tu canción de hoy</div>
      <div class="result-song-name">${data.song}</div>
      <div class="result-artist">${data.artist}</div>

      <div class="result-message-box">
        <span class="result-message-icon">${isPositive ? '💬' : '🫂'}</span>
        <div class="result-message">${data.message}</div>
      </div>

      <div class="album-visual">${data.albumEmoji}</div>
    </div>

    <div class="result-actions">
      <button class="btn-retry" onclick="resetToQuestion()">
        🔄 Cambiar emoción
      </button>
      <a class="btn-spotify ${btnClass}" href="${spotifySearch}" target="_blank">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="${isPositive ? '#000' : '#fff'}"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
        Escuchar en Spotify
      </a>
    </div>
  `;

  // re-attach cursor listeners
  resultEl.querySelectorAll('button, a').forEach(el => {
    el.addEventListener('mouseenter', () => cursor.style.transform = 'scale(2.5)');
    el.addEventListener('mouseleave', () => cursor.style.transform = 'scale(1)');
  });
}

// ===== RESET =====
function resetToQuestion() {
  document.getElementById('orb1').style.background = 'var(--green)';
  document.getElementById('orb2').style.background = 'var(--purple)';
  showScreen('screen-question');
}
</script>
</body>
</html>
